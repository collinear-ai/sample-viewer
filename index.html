<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Main tabs */

  .main-tab { padding: 10px 20px; font-size: 13px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }

  /* Trajectory stats bar */

  .traj-stat-value { font-size: 18px; font-weight: 600; color: #fff; }
  .traj-stat-value.accent { color: #ee8443; }

  /* Trajectory markdown */

  .traj-content h1 { font-size: 20px; color: #fff; margin: 24px 0 12px; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; }
  .traj-content h2 { font-size: 17px; color: #ee8443; margin: 28px 0 10px; border-bottom: 1px solid #2a2a2a20; padding-bottom: 6px; }
  .traj-content h3 { font-size: 14px; color: #b388ff; margin: 18px 0 8px; }
  .traj-content p { margin: 6px 0; color: #ccc; }
  .traj-content ul, .traj-content ol { margin: 8px 0 8px 20px; color: #ccc; }
  .traj-content li { margin: 4px 0; }
  .traj-content strong { color: #fff; }
  .traj-content em { color: #999; }
  .traj-content code { background: #252525; padding: 2px 6px; border-radius: 4px; font-size: 13px; color: #ee8443; font-family: 'SF Mono', Monaco, monospace; }
  .traj-content pre { background: #111; border: 1px solid #2a2a2a; border-radius: 6px; padding: 14px; overflow-x: auto; margin: 10px 0; max-height: 400px; overflow-y: auto; }
  .traj-content pre code { background: none; padding: 0; color: #ccc; font-size: 12px; line-height: 1.5; }
  .traj-content hr { border: none; border-top: 2px solid #2a2a2a; margin: 24px 0; }
  .traj-content blockquote { border-left: 3px solid #ee8443; padding-left: 14px; color: #aaa; margin: 10px 0; }
  .traj-content table { width: 100%; border-collapse: collapse; margin: 12px 0; }

var MANIFEST = [{"folder": "accounting_tax", "title": "Task: Prepare Classified Financial Statements", "instruction": "# Task: Prepare Classified Financial Statements\n\n## Company\nPinnacle Consulting Group LLC\n\n## Period\nQuarter ended December 31, 2025\n\n## Inputs Provided\n1. **trial_balance_q4_2025.csv** – Trial balance listing all general-ledger accounts with their debit or credit balances.\n2. **chart_of_accounts.csv** – Chart of accounts mapping each account number to its name, category, and subcategory.\n\n## Deliverable\nProduce a single Excel workbook named **financial_statements_q4_2025.xlsx** containing two worksheets:\n\n### Sheet 1 – Income Statement\nPrepare a classified income statement with the following sections:\n- **Revenue** – itemized, with a subtotal\n- **Cost of Services** – itemized, with a subtotal\n- **Gross Profit** (Revenue minus Cost of Services)\n- **Operating Expenses** – itemized (sorted largest to smallest), with a subtotal\n- **Operating Income** (Gross Profit minus Operating Expenses)\n- **Other Income / (Expense)** – itemized, with a net subtotal\n- **Net Income** (Operating Income plus net Other Income/Expense)\n\n### Sheet 2 – Balance Sheet\nPrepare a classified balance sheet with the following sections:\n- **Current Assets** – itemized, with a subtotal\n- **Property and Equipment** – show gross asset values, accumulated depreciation, and net totals\n- **Total Assets**\n- **Current Liabilities** – itemized, with a subtotal\n- **Long-term Liabilities** – itemized, with a subtotal\n- **Total Liabilities**\n- **Members' Equity** – include Members' Capital, Retained Earnings, and Net Income for the period\n- **Total Liabilities and Members' Equity** (must equal Total Assets)\n\n## Formatting Requirements\n- Bold section headers and totals\n- Currency format (#,##0.00) for all dollar amounts\n- Single underline for section subtotals\n- Double underline for grand totals (Net Income, Total Assets, Total L&E)\n- Title block on each sheet: company name, statement name, and period\n\n## Validation\n- The trial balance must balance (total debits = total credits).\n- Total Assets must equal Total Liabilities + Members' Equity.\n- Net Income on the Income Statement must match the Net Income shown in Members' Equity on the Balance Sheet.\n", "inputFileNames": ["chart_of_accounts.csv", "trial_balance_q4_2025.csv"], "goldenOutputNames": ["financial_statements_q4_2025.xlsx"], "agentOutputNames": ["financial_statements_q4_2025.xlsx"], "trajectory": {"model": "claude-sonnet-4-20250514", "turn_count": 5, "token_usage": {"input_tokens": 12060, "output_tokens": 2149, "total_tokens": 14209}, "elapsed_seconds": 37.7, "output_files": [{"filename": "financial_statements_q4_2025.xlsx", "size_chars": 2800, "file_size_bytes": 7261, "format_notes": "Bold formatting for: All section headers (REVENUE, COST OF SERVICES, etc.), subtotals (Total Revenue, Total Cost of Services, etc.), and final totals (NET INCOME, TOTAL ASSETS, etc.). Currency format (#,##0.00) for all numerical values. Single underline for section subtotals, double underline for grand totals. Company name and statement headers should be centered and bold."}]}}, {"folder": "education", "title": "Task: Create a 5-Day Lesson Plan for High School Biology -- Cellular Respiration", "instruction": "# Task: Create a 5-Day Lesson Plan for High School Biology -- Cellular Respiration\n\n## Context\nYou are a high school biology teacher preparing a unit on cellular respiration\nfor your 10th-grade biology class. You have been provided with:\n\n1. **state_standards_biology.pdf** -- The relevant Next Generation Science\n   Standards (NGSS) for this unit, including performance expectations and\n   crosscutting concepts.\n2. **textbook_chapter_outline.docx** -- The chapter outline from your adopted\n   textbook covering cellular respiration and fermentation.\n\n## Deliverable\nCreate a single DOCX file named **lesson_plan_cellular_respiration.docx** that\ncontains a complete, professional 5-day lesson plan for this unit.\n\n## Required Sections\n\n### 1. Unit Overview\n- List all NGSS standards addressed (with codes)\n- 3-4 Essential Questions for the unit\n- Unit-level learning objectives\n\n### 2. Daily Lesson Plans (Day 1 through Day 5)\nEach day must include:\n- **Learning Objectives** tied to specific NGSS standards\n- **Materials Needed**\n- **Bell Ringer / Warm-Up Activity** (5 minutes)\n- **Direct Instruction** (15-20 minutes)\n- **Guided Practice or Lab Activity** (20-25 minutes)\n- **Assessment / Closure** (5-10 minutes)\n- **Differentiation Strategies** (for ELL, advanced, and struggling learners)\n- **Homework Assignment**\n\n### 3. Unit Assessment Rubric\nA rubric (table format) for evaluating student mastery across the unit,\ncovering content knowledge, scientific practices, and communication.\n\n### 4. Complete Materials List\nA consolidated list of all materials, equipment, and handouts needed for\nthe entire 5-day unit.\n\n## Suggested Day-by-Day Pacing\n- **Day 1**: Introduction to cellular respiration; overview and glycolysis\n- **Day 2**: The Krebs cycle\n- **Day 3**: Electron transport chain and chemiosmosis\n- **Day 4**: Fermentation and anaerobic respiration; lab activity\n- **Day 5**: Review, integration, and unit assessment\n\n## Formatting Guidelines\n- Use clear headings and subheadings\n- Present the rubric as a table\n- Keep language appropriate for a professional teaching document\n- Align every objective to a specific standard code\n", "inputFileNames": ["state_standards_biology.pdf", "textbook_chapter_outline.docx"], "goldenOutputNames": ["lesson_plan_cellular_respiration.docx"], "agentOutputNames": ["lesson_plan_cellular_respiration.docx"], "trajectory": {"model": "claude-sonnet-4-20250514", "turn_count": 6, "token_usage": {"input_tokens": 17930, "output_tokens": 5547, "total_tokens": 23477}, "elapsed_seconds": 115.4, "output_files": [{"filename": "lesson_plan_cellular_respiration.docx", "size_chars": 17561, "file_size_bytes": 43623, "format_notes": "This document includes clear headings, a professional rubric table, comprehensive daily lesson plans with all required components, proper NGSS alignment, differentiation strategies, and a complete materials list. Each lesson follows the specified structure with time allocations and ties learning objectives to specific standards."}]}}, {"folder": "finance_reconsilation_excel_output", "title": "Bank Reconciliation — Crestview Landscaping LLC, February 2026", "instruction": "# Bank Reconciliation — Crestview Landscaping LLC, February 2026\n\nYou are given two files in `/app/`:\n\n- `bank_statement_feb2026.csv` — a monthly bank statement from Heritage National Bank\n- `general_ledger_feb2026.xlsx` — the company's general ledger workbook (multi-sheet: Chart of Accounts, Cash Account Detail for account 1010, Journal Entry Register, and Trial Balance)\n\nBoth files cover the period February 1–28, 2026. The opening cash balance on both records is $34,817.56.\n\n## Your task\n\nPerform a full bank reconciliation and produce a file at `/app/bank_reconciliation_feb2026.xlsx` that an accountant would deliver to a client or manager. The workbook must contain:\n\n1. **Reconciliation Summary** — the main reconciliation showing:\n   - Bank ending balance, adjusted for deposits in transit and outstanding checks, arriving at an adjusted bank balance.\n   - Book (GL) ending balance, adjusted for bank-only items (charges/credits on the bank statement not yet in the books), error corrections, and any duplicate entries, arriving at an adjusted book balance.\n   - The two adjusted balances must agree.\n\n2. **Outstanding Checks** — a listing of checks recorded in the GL that have not yet cleared the bank, with check number, date, payee, and amount.\n\n3. **Deposits in Transit** — a listing of deposits recorded in the GL that do not yet appear on the bank statement.\n\n4. **Adjusting Journal Entries** — the journal entries needed to update the books for items discovered during the reconciliation (bank charges not in GL, interest earned, NSF returns, error corrections, duplicate removals). Each entry must have proper debits and credits with account numbers.\n\n5. **Matched Transactions** — a sheet showing each bank transaction matched to its GL counterpart, flagging any amount mismatches.\n\n## What to look for\n\nThere are multiple discrepancies between the bank statement and the general ledger. These may include:\n\n- Items on the bank statement that are not recorded in the books\n- Items in the books that have not yet cleared the bank\n- Recording errors (wrong amounts)\n- Duplicate entries\n\nYou must identify all of them. The reconciliation must balance — the adjusted bank balance and adjusted book balance must be equal.\n\n## Output\n\nSave the completed workbook to `/app/bank_reconciliation_feb2026.xlsx`.\n", "inputFileNames": ["bank_statement_feb2026.csv", "general_ledger_feb2026.xlsx"], "goldenOutputNames": ["bank_reconciliation_feb2026.xlsx"], "agentOutputNames": ["bank_reconciliation_feb2026.xlsx"], "trajectory": {"model": "claude-sonnet-4-20250514", "turn_count": 5, "token_usage": {"input_tokens": 29887, "output_tokens": 5117, "total_tokens": 35004}, "elapsed_seconds": 79.3, "output_files": [{"filename": "bank_reconciliation_feb2026.xlsx", "size_chars": 9179, "file_size_bytes": 12636, "format_notes": "Currency columns should be formatted as accounting format with $ and commas. Outstanding checks, deposits in transit, and adjusting entries should have clear subtotals. Reconciliation summary should show clear mathematical progression to the final reconciled balance."}]}}, {"folder": "government", "title": "Task: Draft a Policy Brief on Public Transit Expansion", "instruction": "# Task: Draft a Policy Brief on Public Transit Expansion\n\n## Role\nYou are a senior policy analyst in the City Manager's Office for Riverside City (population ~280,000).\n\n## Objective\nUsing the provided research summaries, budget data, and stakeholder comments, produce a professional policy brief to inform the City Council's decision on expanding public transit.\n\n## Input Files\n1. **research_summaries.docx** - Summaries of four research studies on economic impact, environmental effects, ridership demand, and comparable city case studies.\n2. **transit_budget_data.csv** - Detailed 10-year budget projection with capital costs, operating costs, and revenue sources.\n3. **stakeholder_comments.docx** - Comments from six stakeholder groups representing diverse community perspectives.\n\n## Output Requirements\nProduce a single DOCX file named `transit_expansion_policy_brief.docx` structured as follows:\n\n1. **Header**: \"City of Riverside - Office of the City Manager\"\n2. **Title**: \"Policy Brief: Public Transit Expansion Options\"\n3. **Date**: March 2026\n4. **Issue Statement** (1 paragraph): Concisely frame the policy question.\n5. **Background**: Summarize the current transit system and growth pressures driving the need for expansion.\n6. **Policy Options**: Present three options:\n   - Option A: Full Light Rail (14.2-mile line, 12 stations)\n   - Option B: Bus Rapid Transit\n   - Option C: Hybrid Approach (BRT first, convert to rail if ridership warrants)\n7. **Comparative Analysis**: For each option, assess cost, timeline, projected ridership, equity implications, and environmental impact. Use a comparison table.\n8. **Stakeholder Summary**: Synthesize the range of stakeholder positions, noting areas of consensus and disagreement.\n9. **Fiscal Impact**: Summarize the funding strategy, debt obligations, and revenue projections. Reference specific budget figures.\n10. **Recommendation**: Recommend one option with a clear rationale grounded in the evidence.\n11. **Implementation Timeline**: Provide a high-level phased timeline.\n\n## Guidelines\n- Keep the brief to 2-3 pages (approximately 1,500-2,000 words).\n- Maintain a neutral, evidence-based tone appropriate for elected officials.\n- Reference specific data points from the source documents.\n- Acknowledge trade-offs and risks.\n- Do not advocate for a predetermined conclusion; let the analysis drive the recommendation.\n", "inputFileNames": ["research_summaries.docx", "stakeholder_comments.docx", "transit_budget_data.csv"], "goldenOutputNames": ["transit_expansion_policy_brief.docx"], "agentOutputNames": ["transit_expansion_policy_brief.docx"], "trajectory": {"model": "claude-sonnet-4-20250514", "turn_count": 6, "token_usage": {"input_tokens": 20291, "output_tokens": 2259, "total_tokens": 22550}, "elapsed_seconds": 59.7, "output_files": [{"filename": "transit_expansion_policy_brief.docx", "size_chars": 6507, "file_size_bytes": 39831, "format_notes": "Document should be formatted with professional headers, clear section breaks, and a well-structured table for the comparative analysis. Bold key financial figures and maintain consistent spacing throughout."}]}}, {"folder": "law", "title": "Contract Review Memo — Managed Cloud Infrastructure Services", "instruction": "# Contract Review Memo — Managed Cloud Infrastructure Services\n\n## Context\n\nApex Dynamics Inc. (\"Client\") and Stratos Cloud Solutions LLC (\"Provider\") have executed a Term Sheet for managed cloud infrastructure services. Outside counsel has received a draft Master Services Agreement (v2) prepared by Provider's legal team. Your task is to compare the two documents and produce a contract review memo identifying all discrepancies.\n\n## Input Files\n\n| File | Description |\n|------|-------------|\n| `term_sheet_signed.docx` | Fully executed Term Sheet between the parties |\n| `draft_msa_v2.docx` | Draft MSA (version 2) circulated by Provider |\n\n## Deliverable\n\nProduce a single file named **`contract_review_memo.docx`** containing:\n\n1. **Memo Header** — To, From, Date, Re fields\n2. **Executive Summary** — 3-4 sentences summarizing the overall status of the draft MSA and the number/severity of discrepancies found\n3. **Discrepancy Table** — A table with columns:\n   - Section (MSA article reference)\n   - Term Sheet Provision\n   - Draft MSA Provision\n   - Severity (Critical / High / Medium / Low)\n   - Recommended Action\n4. **Detailed Analysis** — For each discrepancy, explain the legal and business impact and provide recommended contract language to resolve it\n5. **Risk Assessment** — Overall risk rating with brief justification\n6. **Recommended Next Steps** — Prioritized action items for the client\n\n## Formatting Requirements\n\n- Professional legal memo format\n- Use clear headings and numbered sections\n- Table should be formatted for easy scanning\n- Severity ratings should follow: **Critical** (deal terms / financial), **High** (legal rights / compliance), **Medium** (operational), **Low** (administrative)\n", "inputFileNames": ["draft_msa_v2.docx", "term_sheet_signed.docx"], "goldenOutputNames": ["contract_review_memo.docx"], "agentOutputNames": ["contract_review_memo.docx"], "trajectory": {"model": "claude-sonnet-4-20250514", "turn_count": 5, "token_usage": {"input_tokens": 15633, "output_tokens": 2416, "total_tokens": 18049}, "elapsed_seconds": 47.9, "output_files": [{"filename": "contract_review_memo.docx", "size_chars": 7034, "file_size_bytes": 40028, "format_notes": "Format as professional legal memo with clear headings, numbered sections, and table with proper borders. Emphasize critical items in bold. Include standard legal disclaimer."}]}}, {"folder": "marketing_sales", "title": "Competitive Market Analysis Report", "instruction": "# Competitive Market Analysis Report\n\n## Objective\nProduce a professional competitive market analysis report for **TaskFlow Pro**, a B2B project management SaaS product, based on the provided customer survey data and competitor feature matrix.\n\n## Input Files\n1. **customer_survey_q4_2025.xlsx** — Q4 2025 survey results from 50 respondents rating TaskFlow Pro and three competitors (Projectwise, WorkHub, PlanIt) across six dimensions on a 1-10 scale. Includes company size, industry, current tool, NPS likelihood, and open-ended feedback.\n2. **competitor_features.csv** — Feature comparison matrix covering 25 features across six categories (Project Management, Collaboration, Reporting & Analytics, Integrations, Security, Pricing) with availability and plan-tier information.\n\n## Deliverable\nA single DOCX file named `competitive_analysis_report.docx` containing the following sections:\n\n1. **Executive Summary** — One-paragraph overview of key findings and strategic implications.\n2. **Market Overview** — Brief competitive landscape positioning of all four products.\n3. **Survey Analysis**\n   - Average satisfaction scores by dimension (table)\n   - Net Promoter Score / likelihood-to-recommend analysis (table + commentary)\n   - Segmentation by company size\n4. **Feature Gap Analysis** — Where TaskFlow Pro leads and where it lags relative to competitors, with a feature-count-by-tier summary.\n5. **Competitor Profiles** — Strengths and weaknesses for Projectwise, WorkHub, and PlanIt.\n6. **Key Customer Quotes** — Organized by theme (usability, value, features, support, integrations).\n7. **Strategic Recommendations** — Top 5 prioritized actions with rationale and estimated impact.\n8. **Appendix: Survey Methodology** — Description of survey design, sample, and limitations.\n\n## Formatting Guidelines\n- Use headings and subheadings for clear structure.\n- Present quantitative data in tables.\n- Keep the report concise and action-oriented (~3-5 pages).\n", "inputFileNames": ["competitor_features.csv", "customer_survey_q4_2025.xlsx"], "goldenOutputNames": ["competitive_analysis_report.docx"], "agentOutputNames": ["competitive_analysis_report.docx"], "trajectory": {"model": "claude-sonnet-4-20250514", "turn_count": 5, "token_usage": {"input_tokens": 16956, "output_tokens": 3339, "total_tokens": 20295}, "elapsed_seconds": 64.2, "output_files": [{"filename": "competitive_analysis_report.docx", "size_chars": 9955, "file_size_bytes": 41028, "format_notes": "Use bold headers for major sections, clear table formatting with borders, and bullet points for lists. Include professional spacing between sections."}]}}, {"folder": "onboarding_document", "title": "Instructions: Employee Onboarding Packet", "instruction": "# Instructions: Employee Onboarding Packet\n\n## Overview\n\nYou are given four documents related to a new hire joining Meridian Analytics as a Senior Product Manager on the DataBridge platform team. Your task is to read all four documents and produce a single consolidated onboarding guide tailored to this specific role.\n\n## Input Files\n\nYou will find the following files in the input directory:\n\n1. **Meridian_Analytics_Employee_Handbook_2026.pdf** - The company-wide employee handbook (PDF)\n2. **Senior_Product_Manager_Job_Description.docx** - The job description for the role (Word document)\n3. **Platform_Group_Org_Chart_Q1_2026.pptx** - The team org chart (PowerPoint presentation)\n4. **Meridian_Analytics_Benefits_Summary_2026.pdf** - The benefits summary (PDF)\n\nRead and extract content from all four files before you begin writing the output.\n\n## Output Requirements\n\nProduce a single document (PDF or DOCX) that serves as a comprehensive, personalized onboarding guide for the new hire. The document should be professional, well-formatted, and readable in approximately 20 to 30 minutes.\n\n### Required Sections\n\nThe output should contain the following sections, in roughly this order. You may adjust section titles and groupings as long as the content is covered.\n\n#### 1. Welcome and Company Overview\n- Pull the welcome message from the handbook and personalize it to the role where possible.\n- Summarize the company mission, values, and office locations from the handbook.\n- Include the Austin HQ address since that is where this role is based.\n\n#### 2. Your Role\n- Summarize the position title, department, reporting structure, and grade level from the job description.\n- List the key responsibilities from the job description. You may lightly condense these but do not omit any.\n- Note the hybrid work schedule (which days in-office, which days remote) and any travel expectations.\n- Include the compensation overview (salary range, bonus eligibility, RSU grant) from the job description.\n\n#### 3. Your Team\n- Extract the relevant org chart information from the PowerPoint. Focus on:\n  - The direct manager (Vanessa Liu, VP of Product)\n  - The senior leadership chain (Derek Washington, SVP Platform, and Priya Chandrasekaran, CEO)\n  - The other product managers on the team and their areas of ownership\n  - The engineering leads the new hire will partner with, especially Nadia Chowdhury (DataBridge Squad EM) and Kevin Nakamura (Connectors Squad EM)\n  - The designers, especially Lena Kowalski who covers DataBridge\n  - The cross-functional partners and their meeting cadences\n- Present this as a readable summary with names, titles, and what the new hire should know about working with each person. Do not simply paste the org chart as a flat list.\n\n#### 4. Key Policies\n- Summarize the most important policies from the handbook that a new hire needs to know in their first month. At minimum, cover:\n  - Employment classification and at-will status (brief summary, not the full legal text)\n  - Code of conduct and ethics training requirement\n  - Anti-harassment policy and how to report concerns\n  - Dress code\n  - Expense reimbursement process (Concur, $25 receipt threshold, 30-day submission window)\n  - Information security basics (1Password, MFA, security training, reporting incidents)\n  - Data classification overview\n  - Remote work technology requirements (VPN, internet speed, stipends)\n- For each policy, keep the summary to two or three sentences and note that the full details are in the Employee Handbook.\n\n#### 5. Benefits Overview\n- Summarize the benefits package from the benefits summary PDF. Include:\n  - Medical plan options (three tiers) with a brief comparison, not the full table\n  - Dental and vision availability\n  - 401(k) match structure (dollar-for-dollar on first 4%, 50% on next 2%, three-year vesting)\n  - PTO accrual for a new hire (18 days in the first two years)\n  - Parental leave (16 weeks, after 6 months tenure)\n  - Key stipends (home office $500, internet $75/month, wellness $75/month, L&D $2,500/year)\n  - EAP availability (ComPsych, 8 sessions per issue)\n- Note the enrollment deadline: within 30 days of start date through meridian.benergy.com.\n- Include the benefits team contact (benefits@meridiananalytics.com, ext. 3210).\n\n#### 6. Tools and Systems\n- Compile a list of all tools and systems mentioned across the four documents that the new hire will need access to. Based on the source documents, this should include at minimum:\n  - BambooHR (PTO requests, org directory)\n  - Lattice (performance reviews, goal setting, continuous feedback)\n  - ADP Workforce Now (paystubs, direct deposit)\n  - Concur (expense reports)\n  - Jira (engineering sprint tracking, IT service desk)\n  - Confluence (documentation, PRDs)\n  - Figma (design collaboration)\n  - Slack (team communication)\n  - 1Password (credential management)\n  - Cisco AnyConnect (VPN)\n  - The benefits enrollment portal (meridian.benergy.com)\n  - Fidelity NetBenefits (401k management)\n- For each tool, include a one-line description of what it is used for.\n\n#### 7. First 90 Days\n- Create a suggested 30/60/90 day plan based on what you can infer from the source documents. This section requires some synthesis and judgment. A reasonable structure might be:\n  - **First 30 days**: Complete benefits enrollment, set up all tool access, complete Code of Conduct and Security Awareness trainings, meet with Vanessa Liu to align on expectations, schedule introductory 1:1s with each PM on the team, meet with Nadia Chowdhury and the DataBridge engineering squad, meet with Lena Kowalski (designer), begin attending sprint ceremonies, review existing DataBridge product documentation and roadmap, conduct initial customer discovery sessions.\n  - **Days 31 to 60**: Establish regular cadences with cross-functional partners (Rachel Kim in Customer Success, Nina Rosenberg in Product Marketing, Ellen Bradshaw in Support), draft or refine Q2/Q3 roadmap priorities for DataBridge, write your first PRD, begin tracking key product metrics (adoption, time-to-value, integration failure rates, NPS), run your first competitive analysis cycle.\n  - **Days 61 to 90**: Present your first quarterly roadmap update to leadership, lead a customer discovery synthesis session, contribute to PM team practices and templates, work with Vanessa to set formal goals in Lattice for the mid-year review, identify one area for process improvement and propose a solution.\n- This section should feel actionable and specific, not generic. Use the names, tools, and processes from the source documents.\n\n#### 8. Key Contacts\n- Provide a quick-reference contact list pulling from all four documents. Include at minimum:\n  - Vanessa Liu (direct manager)\n  - Derek Washington (skip-level)\n  - People Operations (people-ops@meridiananalytics.com, ext. 3200)\n  - Benefits (benefits@meridiananalytics.com, ext. 3210)\n  - IT Service Desk (reference Jira)\n  - Facilities / Building Security (facilities@meridiananalytics.com)\n  - Emergency Response Coordinator, Austin (Rachel Nakamura, ext. 4501)\n  - EthicsPoint Hotline (1-888-555-0142)\n  - Security Incidents (security@meridiananalytics.com)\n\n## Formatting Guidelines\n\n- Use clear headings and subheadings so the document is scannable.\n- Avoid reproducing entire policy sections verbatim. Summarize and point back to the source document.\n- Use tables sparingly and only where they genuinely improve readability (e.g., the tools list, the contacts list, or the benefits comparison).\n- The tone should be welcoming and practical, not legalistic. This is a document meant to help someone feel prepared on their first day.\n- Target length: approximately 8 to 15 pages if PDF, or equivalent in DOCX.\n\n## What Not To Do\n\n- Do not simply concatenate the four input documents into one file.\n- Do not include the full text of every policy from the handbook. Summarize and reference.\n- Do not reproduce the medical plan premium tables in full. A brief comparison is sufficient.\n- Do not include information from the job description that is only relevant to the hiring process (e.g., the five-stage interview loop), since the person has already been hired.\n- Do not invent information that does not appear in the source documents. If something is unclear or missing from the inputs, note it and move on.\n- Do not use em-dashes anywhere in the output.\n", "inputFileNames": ["Meridian_Analytics_Benefits_Summary_2026.pdf", "Meridian_Analytics_Employee_Handbook_2026.pdf", "Platform_Group_Org_Chart_Q1_2026.pptx", "Senior_Product_Manager_Job_Description.docx"], "goldenOutputNames": ["onboarding_guide.docx"], "agentOutputNames": ["Senior_Product_Manager_Onboarding_Guide.docx"], "trajectory": {"model": "claude-sonnet-4-20250514", "turn_count": 7, "token_usage": {"input_tokens": 35131, "output_tokens": 4983, "total_tokens": 40114}, "elapsed_seconds": 104.9, "output_files": [{"filename": "Senior_Product_Manager_Onboarding_Guide.docx", "size_chars": 17840, "file_size_bytes": 44361, "format_notes": "Use clear headings and subheadings for easy navigation. The table for tools and systems should be formatted with proper borders. Bold important names, titles, and key information for easy scanning. Maintain professional business document formatting throughout."}]}}, {"folder": "pharmacy", "title": "Drug Interaction Assessment – Task Instructions", "instruction": "# Drug Interaction Assessment – Task Instructions\n\n## Objective\nYou are a clinical pharmacist. Using the two input files provided, produce a\ncomprehensive **Drug Interaction Assessment Report** for patient **PT-2026-0847**\nas an Excel workbook (`drug_interaction_assessment.xlsx`).\n\n## Input Files\n| File | Description |\n|------|-------------|\n| `patient_medications.csv` | Active medication list for the patient |\n| `drug_interactions_db.csv` | Reference database of known drug-drug interactions |\n\n## Required Output Sheets\n\n### Sheet 1 – \"Patient Summary\"\n- Patient demographics (ID, name, DOB, age, sex, weight, height)\n- Known allergies, renal function, hepatic function\n- Active medical conditions\n- Complete medication table (all columns from the CSV)\n\n### Sheet 2 – \"Interaction Matrix\"\n- An N×N grid where rows and columns are the patient's medications (generic names).\n- Each cell where an interaction exists should display the severity level.\n- Colour-code cells: **Red** = Major, **Yellow** = Moderate, **Green** = Minor, blank = None.\n\n### Sheet 3 – \"Detailed Interactions\"\n- One row per identified interaction pair, sorted by severity (Major first).\n- Columns: Drug A, Drug B, Severity, Interaction Type, Mechanism, Clinical Effect,\n  Recommendation, Evidence Level, Priority Rank (1 = highest risk).\n\n### Sheet 4 – \"Risk Assessment\"\n- Polypharmacy risk summary (total medications, total interactions by severity).\n- Flag the top high-risk combinations with brief clinical rationale.\n- Identify deprescribing candidates (medications that could potentially be\n  simplified or discontinued after physician review).\n- Summarise overall risk tier (High / Moderate / Low).\n\n### Sheet 5 – \"Monitoring Plan\"\n- Table of recommended laboratory tests, vitals, and clinical assessments.\n- Columns: Parameter, Target Range, Frequency, Rationale, Related Medications.\n\n## Formatting Guidelines\n- Use professional formatting with colour-coded headers.\n- Bold section titles, auto-sized columns, thin borders on data cells.\n- Severity colours must be consistent across all sheets.\n", "inputFileNames": ["drug_interactions_db.csv", "patient_medications.csv"], "goldenOutputNames": ["drug_interaction_assessment.xlsx"], "agentOutputNames": ["drug_interaction_assessment.xlsx"], "trajectory": {"model": "claude-sonnet-4-20250514", "turn_count": 5, "token_usage": {"input_tokens": 19440, "output_tokens": 6076, "total_tokens": 25516}, "elapsed_seconds": 84.2, "output_files": [{"filename": "drug_interaction_assessment.xlsx", "size_chars": 15652, "file_size_bytes": 15682, "format_notes": "Professional formatting with color-coded headers. Severity levels: Red cells for Major interactions, Yellow for Moderate, Green for Minor. Bold section titles, auto-sized columns, thin borders on data cells. Patient Summary sheet includes complete demographics section, medical conditions, and full medication table. Interaction Matrix shows N×N grid with medication names as headers. Risk Assessment includes priority ranking and clinical rationale. Monitoring Plan provides comprehensive surveillance strategy for all identified risks."}]}}, {"folder": "professional_assistant", "title": "Task: Create a Comprehensive Executive Travel Itinerary", "instruction": "# Task: Create a Comprehensive Executive Travel Itinerary\n\n## Context\nYou are the executive assistant to Jordan Chen, Chief Revenue Officer. Jordan has\na 4-day business trip from **March 23-26, 2026** covering San Francisco, Seattle,\nand Portland. You have been provided with:\n\n1. **meeting_schedule_march2026.xlsx** – the confirmed meeting schedule.\n2. **travel_preferences.docx** – Jordan's standing travel preferences and policies.\n\n## Deliverable\nProduce a single Word document named **travel_itinerary_march2026.docx** that\nserves as the complete trip reference. It must include:\n\n1. **Trip Overview** – dates, cities visited, and key objectives for the trip.\n2. **Day-by-Day Itinerary (March 23-26)** for each day:\n   - Flight details (airline, flight number, departure/arrival times, airports,\n     terminal info) adhering to Jordan's airline and class preferences.\n   - Hotel check-in and check-out information (property name, address,\n     confirmation reference placeholder, rate).\n   - Full meeting schedule with venue addresses and estimated travel time\n     between consecutive venues.\n   - Ground transportation recommendations per Jordan's preferences.\n   - Restaurant recommendations for breakfast, lunch, and dinner that\n     accommodate gluten-free and shellfish-allergy requirements.\n   - Clearly marked buffer time between meetings at different locations.\n3. **Packing & Preparation Checklist** – clothing, tech, documents, etc.\n4. **Key Contacts List** – all meeting contacts plus assistant & travel desk.\n5. **Expense Tracking Template** – a simple table to log expenses by category.\n6. **Emergency Information** – nearest hospital to each hotel, assistant\n   contact, travel desk hotline.\n\n## Formatting Guidelines\n- Use professional headings and consistent formatting.\n- Include tables where appropriate (schedule, contacts, expenses).\n- Ensure flight and hotel choices comply with the stated preferences and expense\n  caps.\n- Use realistic details (actual airport codes, plausible flight numbers, real\n  neighborhood restaurants known for allergen-friendly menus).\n\n## Constraints\n- The itinerary must allow at least 30 minutes of travel buffer between meetings\n  at different locations.\n- No meetings should be scheduled after 6:00 PM.\n- Hotel nightly rate must not exceed $350.\n", "inputFileNames": ["meeting_schedule_march2026.xlsx", "travel_preferences.docx"], "goldenOutputNames": ["travel_itinerary_march2026.docx"], "agentOutputNames": ["travel_itinerary_march2026.docx"], "trajectory": {"model": "claude-sonnet-4-20250514", "turn_count": 5, "token_usage": {"input_tokens": 16473, "output_tokens": 5291, "total_tokens": 21764}, "elapsed_seconds": 96.0, "output_files": [{"filename": "travel_itinerary_march2026.docx", "size_chars": 12619, "file_size_bytes": 42337, "format_notes": "Professional business document with clear headings, structured tables for schedules and contacts, and comprehensive day-by-day breakdown. Bold headings and important information for easy scanning."}]}}, {"folder": "public_health", "title": "Weekly Influenza Surveillance Report – State of Columbia", "instruction": "# Weekly Influenza Surveillance Report – State of Columbia\n\n## Objective\nUsing the provided surveillance case data and county demographic data, produce\na professional **weekly epidemiology surveillance report** for MMWR Week 10\n(March 2–8, 2026) as a DOCX document.\n\n## Input Files\n1. **influenza_cases_week10_2026.csv** – Line-level case data for week 10 plus\n   summary rows for 3 prior weeks (weeks 7–9) for trend context.\n   - Columns: county, report_date, age_group, case_count, hospitalizations,\n     deaths, specimen_type, lab_confirmed\n   - Rows with age_group = \"ALL\" are prior-week county summaries.\n2. **county_demographics.csv** – Population and socioeconomic data for 8\n   counties in Columbia.\n\n## Required Report Sections (DOCX)\n1. **Report Header** – \"State of Columbia, Department of Health, Influenza\n   Surveillance Report, MMWR Week 10 (March 2–8, 2026)\".\n2. **Executive Summary** – Overall activity level (low / moderate / high /\n   very high), trend direction, and any notable events.\n3. **Surveillance Data Summary** – Total cases, hospitalizations, and deaths\n   for week 10. Include lab-confirmed vs. total breakdown.\n4. **Geographic Distribution** – Table of cases and incidence rates\n   (per 100,000) by county. Identify the top-2 hotspot counties.\n5. **Age Distribution Analysis** – Table of case counts and rates per 100,000\n   by age group. Identify the most-affected age group.\n6. **Strain Distribution** – Breakdown of cases by specimen type (A/H1N1,\n   A/H3N2, B/Victoria). Discuss dominant circulating strain.\n7. **Trend Analysis** – Compare week 10 totals with weeks 7–9. State whether\n   activity is increasing, stable, or decreasing. Include a summary table\n   (week, total cases, hospitalizations, deaths).\n8. **Hospitalization & Mortality** – Calculate the case-fatality rate (CFR)\n   and hospitalization rate. Identify high-risk groups.\n9. **Recommendations** – Actionable public health guidance: vaccination\n   messaging, targeted outreach for high-risk groups, healthcare-provider\n   alerts.\n10. **Methodology Notes** – Brief description of data sources and\n    rate-calculation methods.\n\n## Formatting Guidelines\n- Use tables for all quantitative summaries.\n- Bold key findings within narrative paragraphs.\n- Use heading levels 1 (report title) and 2 (section headings).\n- Keep the report concise and suitable for distribution to local health\n  departments and clinicians.\n\n## Output\nSave as: `influenza_surveillance_week10_2026.docx`\n", "inputFileNames": ["county_demographics.csv", "influenza_cases_week10_2026.csv"], "goldenOutputNames": ["influenza_surveillance_week10_2026.docx"], "agentOutputNames": ["influenza_surveillance_week10_2026.docx"], "trajectory": {"model": "claude-sonnet-4-20250514", "turn_count": 5, "token_usage": {"input_tokens": 21322, "output_tokens": 3268, "total_tokens": 24590}, "elapsed_seconds": 64.5, "output_files": [{"filename": "influenza_surveillance_week10_2026.docx", "size_chars": 7926, "file_size_bytes": 40680, "format_notes": "Bold key findings and metrics throughout. Use tables for all quantitative data. Structure with clear heading hierarchy (H1 for title, H2 for sections). Emphasize critical findings in bold within narrative text."}]}}];

var currentTask = null;
// Cache for loaded task data
var taskDataCache = {};

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function getFileIcon(filename) {
  var ext = filename.split('.').pop().toLowerCase();
  var icons = {csv:'📊',xlsx:'📗',xls:'📗',pdf:'📕',docx:'📘',doc:'📘',pptx:'📙',ppt:'📙',md:'📄',txt:'📄'};
  return icons[ext] || '📎';
}

function renderTable(rows, maxRows) {
  if (!rows || rows.length === 0) return '<p style="color:#666;">Empty</p>';
  var header = rows[0];
  var body = rows.slice(1, maxRows || rows.length);
  var h = '<div style="overflow-x:auto;"><table class="fv-table"><thead><tr>';
  header.forEach(function(c) { h += '<th>' + esc(c) + '</th>'; });
  h += '</tr></thead><tbody>';
  body.forEach(function(row) {
    h += '<tr>';
    row.forEach(function(c) { h += '<td>' + esc(c) + '</td>'; });
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  if (maxRows && rows.length > maxRows) {
    h += '<p style="color:#666;font-size:12px;margin-top:8px;">Showing ' + (maxRows-1) + ' of ' + (rows.length-1) + ' rows</p>';
  }
  return h;
}

function renderFileContent(data, filename) {
  if (!data) return '<p style="color:#666;">No preview available</p>';

  if (data.type === 'table') {
    return renderTable(data.rows, 200);
  }

  if (data.type === 'spreadsheet') {
    var sheetNames = Object.keys(data.sheets);
    var safeId = filename.replace(/[^a-z0-9]/gi, '');
    var h = '<div class="sheet-tabs" id="sheet-tabs-' + safeId + '">';
    sheetNames.forEach(function(name, i) {
      h += '<div class="sheet-tab' + (i === 0 ? ' active' : '') + '" data-sheet="' + esc(name) + '" data-filename="' + esc(filename) + '">' + esc(name) + '</div>';
    });
    h += '</div><div class="file-viewer-body" id="sheet-body-' + safeId + '">';
    h += renderTable(data.sheets[sheetNames[0]], 200);
    h += '</div>';
    return h;
  }

  if (data.type === 'docx') {
    var h = '<div class="fv-docx">';
    data.content.forEach(function(item) {
      if (item.kind === 'h1') h += '<h1>' + esc(item.text) + '</h1>';
      else if (item.kind === 'h2') h += '<h2>' + esc(item.text) + '</h2>';
      else if (item.kind === 'h3') h += '<h3>' + esc(item.text) + '</h3>';
      else if (item.kind === 'li') h += '<li>' + esc(item.text) + '</li>';
      else if (item.kind === 'table') h += renderTable(item.rows);
      else h += '<p>' + esc(item.text) + '</p>';
    });
    h += '</div>';
    return h;
  }

  if (data.type === 'pdf_images') {
    var h = '';
    data.pages.forEach(function(pg) {
      h += '<div class="fv-img-page"><div class="fv-img-page-num">Page ' + pg.page + '</div>';
      h += '<img src="data:image/jpeg;base64,' + pg.image + '" alt="Page ' + pg.page + '" loading="lazy">';
      h += '</div>';
    });
    return h;
  }

  if (data.type === 'pptx_images') {
    var h = '';
    data.slides.forEach(function(sl) {
      h += '<div class="fv-img-page"><div class="fv-img-page-num">Slide ' + sl.slide + '</div>';
      h += '<img src="data:image/jpeg;base64,' + sl.image + '" alt="Slide ' + sl.slide + '" loading="lazy">';
      h += '</div>';
    });
    return h;
  }

  if (data.type === 'markdown') {
    return '<div class="md-content">' + marked.parse(data.text) + '</div>';
  }

  if (data.type === 'error') {
    return '<p style="color:#e55;">' + esc(data.text) + '</p>';
  }

  return '<p style="color:#666;">No preview available for this file type</p>';
}

// Event delegation for sheet tabs
document.addEventListener('click', function(e) {
  var tab = e.target.closest('.sheet-tab');
  if (!tab) return;
  var filename = tab.dataset.filename;
  var sheetName = tab.dataset.sheet;
  var task = MANIFEST[currentTask];
  var loaded = taskDataCache[task.folder];
  if (!loaded) return;
  var allFiles = Object.assign({}, loaded.inputFiles, loaded.goldenOutput, loaded.agentOutput);
  var data = allFiles[filename];
  if (!data || data.type !== 'spreadsheet') return;

  tab.parentElement.querySelectorAll('.sheet-tab').forEach(function(t) { t.classList.remove('active'); });
  tab.classList.add('active');

  var safeId = filename.replace(/[^a-z0-9]/gi, '');
  var body = document.getElementById('sheet-body-' + safeId);
  if (body) body.innerHTML = renderTable(data.sheets[sheetName], 200);
});

function getFileData(filename, sectionType) {
  var task = MANIFEST[currentTask];
  var loaded = taskDataCache[task.folder];
  if (!loaded) return null;
  if (sectionType === 'input') return loaded.inputFiles[filename];
  if (sectionType === 'agent') return loaded.agentOutput[filename];
  return loaded.goldenOutput[filename];
}

function showFileViewer(card, sectionId, sectionType) {
  var filename = card.dataset.filename;
  var existing = document.getElementById('viewer-' + sectionId);

  if (card.classList.contains('active')) {
    card.classList.remove('active');
    if (existing) existing.remove();
    return;
  }

  if (existing) existing.remove();
  var section = document.getElementById(sectionId);
  section.querySelectorAll('.file-card').forEach(function(c) { c.classList.remove('active'); });
  card.classList.add('active');

  var data = getFileData(filename, sectionType);

  if (!data) {
    // Data not loaded yet — fetch it
    var task = MANIFEST[currentTask];
    card.querySelector('.view-label').textContent = 'Loading...';
    loadTaskData(task.folder, function() {
      data = getFileData(filename, sectionType);
      renderViewer(card, sectionId, filename, data);
    });
    return;
  }

  renderViewer(card, sectionId, filename, data);
}

function renderViewer(card, sectionId, filename, data) {
  var label = card.querySelector('.view-label');
  if (label) label.textContent = 'Click to preview';

  var ext = filename.split('.').pop().toUpperCase();
  var isSpreadsheet = data && data.type === 'spreadsheet';

  var viewer = document.createElement('div');
  viewer.className = 'file-viewer';
  viewer.id = 'viewer-' + sectionId;

  var headerHtml = '<div class="file-viewer-header"><span class="fv-title">' + esc(filename) + '</span><div style="display:flex;align-items:center;gap:12px;"><span class="fv-type">' + ext + '</span><button class="file-viewer-close" data-section="' + sectionId + '">Close</button></div></div>';

  viewer.innerHTML = headerHtml + (isSpreadsheet ? '' : '<div class="file-viewer-body">') + renderFileContent(data, filename) + (isSpreadsheet ? '' : '</div>');

  var section = document.getElementById(sectionId);
  section.appendChild(viewer);
}

// Close button delegation
document.addEventListener('click', function(e) {
  var btn = e.target.closest('.file-viewer-close');
  if (!btn) return;
  var sectionId = btn.dataset.section;
  var viewer = btn.closest('.file-viewer');
  if (viewer) viewer.remove();
  var section = document.getElementById(sectionId);
  if (section) section.querySelectorAll('.file-card').forEach(function(c) { c.classList.remove('active'); });
});

function renderFileCards(fileNames, sectionId, sectionType) {
  if (fileNames.length === 0) return '';
  var h = '';
  fileNames.forEach(function(name) {
    h += '<div class="file-card" data-filename="' + esc(name) + '" data-section="' + sectionId + '" data-section-type="' + sectionType + '">';
    h += '<div class="file-icon">' + getFileIcon(name) + '</div>';
    h += '<div class="file-info"><div class="file-name">' + esc(name) + '</div><div class="file-ext">' + name.split('.').pop() + '</div><div class="view-label">Click to preview</div></div>';
    h += '</div>';
  });
  return h;
}

// File card click delegation
document.addEventListener('click', function(e) {
  var card = e.target.closest('.file-card');
  if (!card) return;
  if (e.target.closest('.file-viewer-close')) return;
  var sectionId = card.dataset.section;
  var sectionType = card.dataset.sectionType;
  if (sectionId && sectionType) {
    showFileViewer(card, sectionId, sectionType);
  }
});

// Lazy-load task file data
function loadTaskData(folder, callback) {
  if (taskDataCache[folder]) {
    if (callback) callback();
    return;
  }
  fetch('data/' + folder + '.json')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      taskDataCache[folder] = data;
      if (callback) callback();
    })
    .catch(function(err) {
      console.error('Failed to load task data:', err);
      taskDataCache[folder] = { inputFiles: {}, goldenOutput: {} };
      if (callback) callback();
    });
}

function renderTaskList() {
  var list = document.getElementById('task-list');
  document.getElementById('task-count').textContent = MANIFEST.length + ' tasks';
  MANIFEST.forEach(function(task, i) {
    var div = document.createElement('div');
    div.className = 'task-item';
    div.onclick = function() { selectTask(i); };
    var inputCount = task.inputFileNames.length;
    var hasGolden = task.goldenOutputNames.length > 0;
    var hasAgent = task.agentOutputNames.length > 0;
    var turns = task.trajectory ? task.trajectory.turn_count : 0;
    div.innerHTML = '<div class="task-name">' + task.folder.replace(/_/g, ' ') + '</div>'
      + '<div class="task-title">' + esc(task.title) + '</div>'
      + '<div class="task-badges">'
      + '<span class="badge badge-input">' + inputCount + ' input' + (inputCount !== 1 ? 's' : '') + '</span>'
      + (turns > 0 ? '<span class="badge badge-turns">' + turns + ' turns</span>' : '')
      + '</div>';
    list.appendChild(div);
  });
}

function switchMainTab(tabName) {
  document.querySelectorAll('.main-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tabName);
  });
  document.querySelectorAll('.tab-content').forEach(function(tc) {
    tc.classList.toggle('active', tc.id === 'tab-' + tabName);
  });
}

// Main tab click delegation
document.addEventListener('click', function(e) {
  var tab = e.target.closest('.main-tab');
  if (!tab) return;
  switchMainTab(tab.dataset.tab);
});

function renderTrajectoryStats(traj) {
  if (!traj) return '';
  var tokens = traj.token_usage || {};
  var elapsed = traj.elapsed_seconds || 0;
  var mins = Math.floor(elapsed / 60);
  var secs = Math.round(elapsed % 60);
  var timeStr = mins > 0 ? mins + 'm ' + secs + 's' : secs + 's';
  var totalTokens = tokens.total_tokens || 0;
  var tokenStr = totalTokens > 1000 ? Math.round(totalTokens / 1000) + 'K' : totalTokens;

  return '<div class="traj-stats">'
    + '<div class="traj-stat"><div class="traj-stat-label">Turns</div><div class="traj-stat-value accent">' + traj.turn_count + '</div></div>'
    + '<div class="traj-stat"><div class="traj-stat-label">Model</div><div class="traj-stat-value" style="font-size:13px;">' + esc(traj.model || 'N/A') + '</div></div>'
    + '<div class="traj-stat"><div class="traj-stat-label">Tokens</div><div class="traj-stat-value">' + tokenStr + '</div></div>'
    + '<div class="traj-stat"><div class="traj-stat-label">Time</div><div class="traj-stat-value">' + timeStr + '</div></div>'
    + '</div>';
}

function renderTrajectoryContent(index) {
  var task = MANIFEST[index];
  var loaded = taskDataCache[task.folder];
  if (!loaded || !loaded.trajectoryMd) {
    return '<p style="color:#666;">Loading trajectory...</p>';
  }
  return '<div class="traj-content">' + marked.parse(loaded.trajectoryMd) + '</div>';
}

function selectTask(index) {
  currentTask = index;
  document.querySelectorAll('.task-item').forEach(function(el, i) { el.classList.toggle('active', i === index); });

  var task = MANIFEST[index];
  var main = document.getElementById('main');
  var hasGolden = task.goldenOutputNames.length > 0;
  var hasAgent = task.agentOutputNames.length > 0;
  var hasTraj = task.trajectory && task.trajectory.turn_count > 0;

  var inputSectionId = 'sec-input-' + index;
  var goldenSectionId = 'sec-golden-' + index;
  var agentSectionId = 'sec-agent-' + index;

  // Build tabs
  var tabs = '<div class="main-tabs">'
    + '<div class="main-tab active" data-tab="overview">Overview</div>';
  if (hasTraj) tabs += '<div class="main-tab" data-tab="trajectory">Trajectory</div>';
  tabs += '</div>';

  // Overview tab content
  var overview = '<div class="tab-content active" id="tab-overview">'
    + '<div class="section" id="' + inputSectionId + '"><div class="section-label">Input Files</div><div class="file-grid">' + renderFileCards(task.inputFileNames, inputSectionId, 'input') + '</div></div>'
    + (hasAgent ? '<div class="section" id="' + agentSectionId + '"><div class="section-label">Agent Output</div><div class="file-grid">' + renderFileCards(task.agentOutputNames, agentSectionId, 'agent') + '</div></div>' : '')
    + (hasGolden ? '<div class="section" id="' + goldenSectionId + '"><div class="section-label">Golden Output</div><div class="file-grid">' + renderFileCards(task.goldenOutputNames, goldenSectionId, 'golden') + '</div></div>' : '')
    + '<div class="section"><div class="section-label">Task Instructions</div><div class="md-content">' + marked.parse(task.instruction) + '</div></div>'
    + '</div>';

  // Trajectory tab content
  var trajTab = '';
  if (hasTraj) {
    trajTab = '<div class="tab-content" id="tab-trajectory">'
      + renderTrajectoryStats(task.trajectory)
      + '<div id="traj-body-' + index + '">'
      + '<p style="color:#888;">Loading trajectory...</p>'
      + '</div></div>';
  }

  main.innerHTML = '<h1>' + esc(task.title) + '</h1>'
    + '<div class="folder-name">' + esc(task.folder) + '/</div>'
    + tabs + overview + trajTab;

  main.scrollTop = 0;

  // Load task data and render trajectory when ready
  loadTaskData(task.folder, function() {
    var trajBody = document.getElementById('traj-body-' + index);
    if (trajBody && taskDataCache[task.folder] && taskDataCache[task.folder].trajectoryMd) {
      trajBody.innerHTML = '<div class="traj-content">' + marked.parse(taskDataCache[task.folder].trajectoryMd) + '</div>';
    }
  });
}

renderTaskList();
</script>
</body>
</html>
